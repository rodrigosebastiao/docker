server {
      # Listen HTTP
      listen 80;
      listen [::]:80;
      server_name api2.listadeacoes.com.br;

      # Redirect HTTP to HTTPS
      return 301 https://$host$request_uri;
  }

  server {
      # Listen HTTPS
      listen 443 ssl;
      listen [::]:443;
      server_name api2.listadeacoes.com.br;

      # SSL config
      # ssl_certificate /etc/letsencrypt/live/certificate/file;
      # ssl_certificate_key /etc/letsencrypt/live/certificate/key;

      ssl_certificate /etc/letsencrypt/live/api2.listadeacoes.com.br/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/api2.listadeacoes.com.br/privkey.pem;


      # Proxy Config
      location / {
          proxy_pass http://stocks-backend:1337; # As named in upstream file
          proxy_http_version 1.1;
          proxy_set_header X-Forwarded-Host $host;
          proxy_set_header X-Forwarded-Server $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Host $http_host;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          proxy_pass_request_headers on;
      }
  }