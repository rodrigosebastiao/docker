version: "3.9"

services:

  traefik:
    image: traefik:v3
    container_name: traefik
    restart: always
    command:
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web-apps
      - --certificatesresolvers.letsencrypt.acme.email=rodrigodanielss@gmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - web-apps

  names-backend:
    image: strapi:latest
    container_name: names-backend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.names.rule=Host(`api.descobrirnomes.com.br`)"
      - "traefik.http.routers.names.entrypoints=websecure"
      - "traefik.http.routers.names.tls.certresolver=letsencrypt"
      - "traefik.http.services.names.loadbalancer.server.port=1337"
    networks:
      - web-apps
      - internal

  postgres:
    image: postgres:17
    container_name: postgres17
    restart: always
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi_db_user
      POSTGRES_PASSWORD: "!Asder2312"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - web-apps

networks:
  web:
  internal:

volumes:
  pgdata:


