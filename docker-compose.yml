services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      # - ./nginx/upstream:/etc/nginx/upstream
      - ./certbot:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - web-apps
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - ./certbot:/etc/letsencrypt
  #     - ./certbot:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
      while :;
      do
        certbot renew;
        sleep 12h;
      done"
  
  postgres:
    restart: unless-stopped
    # env_file: .env
    image: postgres:17
    container_name: postgres17
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: strapi_db_user
      POSTGRES_PASSWORD: "!Asder2312"
    # ports:
    #   - "5432:5432" # Expose external
    # volumes:
    #   - pgdata:/var/lib/postgresql/data
    networks:
      - web-apps

## Create networks
networks:
  web-apps:
    name: web-apps
    external: true
    driver: bridge
